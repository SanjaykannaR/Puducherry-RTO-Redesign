<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Favicon: Simplified Aayi Mandapam dome + cupola -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3c6e"/>
      <stop offset="100%" style="stop-color:#0e2a52"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)" stroke="#c5a028" stroke-width="0.8"/>

  <!-- Simplified monument silhouette -->
  <g transform="translate(16, 17)" stroke="#c5a028" fill="none" stroke-linecap="round">
    <!-- Base -->
    <line x1="-10" y1="6" x2="10" y2="6" stroke-width="0.8"/>
    <line x1="-9" y1="8" x2="9" y2="8" stroke-width="0.5"/>
    
    <!-- Walls + arch -->
    <line x1="-8" y1="-2" x2="-8" y2="6" stroke-width="0.7"/>
    <line x1="8" y1="-2" x2="8" y2="6" stroke-width="0.7"/>
    <path d="M-3,6 Q-3,2 0,1 Q3,2 3,6" stroke-width="0.6"/>
    
    <!-- Columns -->
    <line x1="-6" y1="-2" x2="-6" y2="6" stroke-width="0.5"/>
    <line x1="6" y1="-2" x2="6" y2="6" stroke-width="0.5"/>
    
    <!-- Entablature -->
    <line x1="-9" y1="-3" x2="9" y2="-3" stroke-width="0.6"/>
    
    <!-- Dome -->
    <path d="M-6,-3 Q-6,-10 0,-12 Q6,-10 6,-3" stroke-width="0.7"/>
    
    <!-- Cupola -->
    <path d="M-2,-12 Q-2,-15 0,-16 Q2,-15 2,-12" stroke-width="0.5"/>
    
    <!-- Finial -->
    <line x1="0" y1="-16" x2="0" y2="-18" stroke-width="0.5"/>
    <circle cx="0" cy="-18.5" r="0.8" fill="#c5a028" stroke="none"/>
  </g>
</svg>