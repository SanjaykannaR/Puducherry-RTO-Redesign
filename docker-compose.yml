# ── Docker Compose: RTO Portal ──
# Local dev:  docker compose up --build
# CD deploy:  docker compose up -d (images pulled from registry)
# Logs:       docker compose logs -f backend

services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/sanjaykannar/puducherry-rto-redesign/backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rto-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env.production
    volumes:
      - db-data:/app/prisma
      - backups:/app/prisma/backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  chatbot:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    container_name: rto-chatbot
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - ./chatbot/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/sanjaykannar/puducherry-rto-redesign/frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rto-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
      chatbot:
        condition: service_healthy

volumes:
  db-data:
  backups:
