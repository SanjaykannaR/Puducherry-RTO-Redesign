name: Publish E2E Report

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  pages: write
  id-token: write

jobs:
  publish-report:
    name: Publish Playwright Report
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion != 'cancelled' }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download Shard 1 Report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-shard1
          path: frontend/report-shard1
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Shard 2 Report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-shard2
          path: frontend/report-shard2
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge into single report directory
        run: |
          mkdir -p frontend/report
          # Copy shard2 into shard1 (both are HTML reports)
          cp -r frontend/report-shard2/* frontend/report-shard1/ 2>/dev/null || true
          mv frontend/report-shard1 frontend/report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
