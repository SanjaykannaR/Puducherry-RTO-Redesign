name: CI

on:
  push:
    branches: [sanjay, main]
  pull_request:
    branches: [sanjay, main]

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Backend Tests
  # ──────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Setup Prisma
        run: npx prisma generate

      - name: Run backend tests
        run: npm test
        env:
          PLAYWRIGHT_TEST: "1"

  # ──────────────────────────────────────────
  # JOB 2: Frontend Build + Lint + Type Check
  # ──────────────────────────────────────────
  frontend-build:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api

  # ──────────────────────────────────────────
  # JOB 3: Playwright E2E Tests
  # ──────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      # ── Frontend deps ──
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # ── Backend deps + DB ──
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Setup Prisma + Seed database
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma db push
          node seed.js
        env:
          DATABASE_URL: "file:./dev.db"

      # ── Playwright browsers ──
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # ── Start backend ──
      - name: Start backend server
        working-directory: backend
        run: |
          npx tsx src/index.ts &
          npx tsx -e "
            const http = require('http');
            const check = () => {
              http.get('http://localhost:5000/api/health', (res) => {
                process.exit(res.statusCode === 200 ? 0 : 1);
              }).on('error', () => {
                setTimeout(check, 1000);
              });
            };
            check();
          "
        env:
          PORT: "5000"
          DATABASE_URL: "file:./dev.db"
          PLAYWRIGHT_TEST: "1"

      # ── Start frontend ──
      - name: Build & start frontend
        working-directory: frontend
        run: |
          npm run build
          npx next start -p 3000 &
          npx -y wait-on http://localhost:3000 --timeout 60000
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api

      # ── Run E2E ──
      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: "true"

      # ── Upload artifacts (always, even on failure) ──
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 14

      # ── GitHub Step Summary ──
      - name: Write summary
        if: always()
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Playwright report uploaded as artifact." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**To view:** Actions tab → this run → Artifacts → playwright-report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To view locally: \`cd frontend && npx playwright show-report\`" >> $GITHUB_STEP_SUMMARY
