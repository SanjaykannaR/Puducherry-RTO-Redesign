name: CI

on:
  push:
    branches: [sanjay]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Backend Tests
  # ──────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Setup Prisma
        run: npx prisma generate

      - name: Run backend tests
        run: npm test
        env:
          PLAYWRIGHT_TEST: "1"

  # ──────────────────────────────────────────
  # JOB 2: Frontend Build + Lint + Type Check
  # ──────────────────────────────────────────
  frontend-build:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api

  # ──────────────────────────────────────────
  # JOB 3: Playwright E2E Tests
  # ──────────────────────────────────────────
  # JOB 3a: Playwright E2E Tests — Shard 1
  # ──────────────────────────────────────────
  e2e-shard1:
    name: E2E Shard 1 (app + auth)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      # ── Frontend deps ──
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # ── Backend deps + DB ──
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Setup Prisma + Seed database
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma db push
          node seed.js
        env:
          DATABASE_URL: "file:./dev.db"

      # ── Playwright browsers ──
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # ── Start backend ──
      - name: Start backend server
        working-directory: backend
        run: |
          npx tsx src/index.ts &
          npx tsx -e "
            const http = require('http');
            const check = () => {
              http.get('http://localhost:5000/api/health', (res) => {
                process.exit(res.statusCode === 200 ? 0 : 1);
              }).on('error', () => {
                setTimeout(check, 1000);
              });
            };
            check();
          "
        env:
          PORT: "5000"
          DATABASE_URL: "file:./dev.db"
          PLAYWRIGHT_TEST: "1"

      # ── Warm up backend (JIT + Prisma connection pool) ──
      - name: Warm up backend
        run: |
          for i in 1 2 3 4 5; do
            curl -sf http://localhost:5000/api/health > /dev/null && echo "Health OK (attempt $i)" || echo "Health fail (attempt $i)"
            sleep 1
          done
          # Hit login endpoint to warm up Prisma auth queries
          curl -sf -X POST http://localhost:5000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@rto.gov.in","password":"Admin@123"}' > /dev/null && echo "Login OK" || echo "Login fail"
          curl -sf -X POST http://localhost:5000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@rto.gov.in","password":"Admin@123"}' > /dev/null && echo "Login OK 2" || echo "Login fail 2"
          echo "Backend warmup complete"

      # ── Start frontend ──
      - name: Build & start frontend
        working-directory: frontend
        run: |
          npm run build
          npx next start -p 3000 &
          npx -y wait-on http://localhost:3000 --timeout 60000
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api

      # ── Run E2E Shard 1 ──
      - name: Run Playwright tests (Shard 1)
        working-directory: frontend
        run: npx playwright test --config=playwright.shard1.config.ts
        env:
          CI: "true"

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard1
          path: frontend/playwright-report/
          retention-days: 14

  # ──────────────────────────────────────────
  # JOB 3b: Playwright E2E Tests — Shard 2
  # ──────────────────────────────────────────
  e2e-shard2:
    name: E2E Shard 2 (admin + interactions + exam)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      # ── Frontend deps ──
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # ── Backend deps + DB ──
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Setup Prisma + Seed database
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma db push
          node seed.js
        env:
          DATABASE_URL: "file:./dev.db"

      # ── Playwright browsers ──
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # ── Start backend ──
      - name: Start backend server
        working-directory: backend
        run: |
          npx tsx src/index.ts &
          npx tsx -e "
            const http = require('http');
            const check = () => {
              http.get('http://localhost:5000/api/health', (res) => {
                process.exit(res.statusCode === 200 ? 0 : 1);
              }).on('error', () => {
                setTimeout(check, 1000);
              });
            };
            check();
          "
        env:
          PORT: "5000"
          DATABASE_URL: "file:./dev.db"
          PLAYWRIGHT_TEST: "1"

      # ── Warm up backend (JIT + Prisma connection pool) ──
      - name: Warm up backend
        run: |
          for i in 1 2 3 4 5; do
            curl -sf http://localhost:5000/api/health > /dev/null && echo "Health OK (attempt $i)" || echo "Health fail (attempt $i)"
            sleep 1
          done
          # Hit login endpoint to warm up Prisma auth queries
          curl -sf -X POST http://localhost:5000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@rto.gov.in","password":"Admin@123"}' > /dev/null && echo "Login OK" || echo "Login fail"
          curl -sf -X POST http://localhost:5000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@rto.gov.in","password":"Admin@123"}' > /dev/null && echo "Login OK 2" || echo "Login fail 2"
          echo "Backend warmup complete"

      # ── Start frontend ──
      - name: Build & start frontend
        working-directory: frontend
        run: |
          npm run build
          npx next start -p 3000 &
          npx -y wait-on http://localhost:3000 --timeout 60000
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api

      # ── Run E2E Shard 2 ──
      - name: Run Playwright tests (Shard 2)
        working-directory: frontend
        run: npx playwright test --config=playwright.shard2.config.ts
        env:
          CI: "true"

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard2
          path: frontend/playwright-report/
          retention-days: 14

      # ── GitHub Step Summary ──
      - name: Write summary
        if: always()
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Playwright report uploaded as artifact." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**To view:** Actions tab → this run → Artifacts → playwright-report-shard2" >> $GITHUB_STEP_SUMMARY
