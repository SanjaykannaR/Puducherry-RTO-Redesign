[phases.setup]
nixPkgs = ["nodejs_22"]

[build]
builder = "NIXPACKS"
buildCommand = "cd backend && npm install && npx prisma generate && npx tsc"

[deploy]
startCommand = "cd backend && node dist/index.js"
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
